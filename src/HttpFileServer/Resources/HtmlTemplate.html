<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HttpFileServer</title>
    <script src="/qrcode.min.js?type=resource"></script>
    <script src="/tailwindcss.3.4.17.js?type=resource"></script>
    <link rel="stylesheet" href="/appstyle.css?type=resource" />
    <title id="title">{{title}}</title>
</head>

<body class="min-h-screen">
    <!--头部导航 -->
    <header class="h-16 shadow-sm border-b">
        <div class="max-w-full mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <h1 class="text-xl font-semibold text-primary">{{header}}</h1>
                </div>
                <!-- Theme toggle in header (desktop & mobile) -->
                <div class="flex items-center">
                    <button id="themeToggleHeader" class="theme-toggle-header" type="button" aria-label="切换主题">
                        <!-- simple sun/moon icon -->
                        <svg class="theme-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <path d="M12 3v2M12 19v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M3 12h2M19 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4M12 7a5 5 0 100 10 5 5 0 000-10z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        <span class="theme-text">切换主题</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="h-[calc(100vh-128px)] w-full px-4 sm:px-6 lg:px-8 py-8">
        <!-- 文件操作区域 -->
        <div class="h-full theme-panel rounded-lg shadow-sm">
            <!--视图切换区域 -->
            <div id="fileContainer" class="h-full p-6 relative flex flex-col">
                <!-- 表格视图 -->
                <div id="tableViewContent" class="table-container flex-auto h-full mb-4">
                    <table class="min-w-full divide-y" style="border-color:var(--panel-border)">
                        <thead class="table-header">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider">名称</th>
                                <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider">大小</th>
                                <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider">修改日期</th>
                                <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider">类型</th>
                                <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider file-actions">操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y" style="border-color:var(--panel-border)">
                            {{tableRows}}
                        </tbody>
                    </table>
                </div>
                <!-- 概览信息 -->
                <div class="flex-none">
                    <span class="text-sm text-secondary">总计: {{itemcount}} 个项目</span>
                </div>
            </div>
        </div>
    </div>
    <!-- 底部导航 -->
    <footer class="flex justify-center pb-8">
        <div class="flex items-center space-x-2 text-secondary">{{footer}}</div>
    </footer>

    <!-- 悬停预览浮层 -->
    <div id="previewPopover" class="hidden"></div>

    <!-- 修改后的预览模态框 -->
    <div id="previewModal" class="hidden">
        <div id="previewModalInner" class="rounded-xl">
            <div class="px-4 py-2 border-b flex items-center space-x-2">
                <button id="prevBtn" class="px-2 py-1 text-xs border rounded disabled:opacity-30" onclick="previewPrev()">
                    ◀
                </button>
                <button id="nextBtn" class="px-2 py-1 text-xs border rounded disabled:opacity-30" onclick="previewNext()">
                    ▶
                </button>
                <h3 id="previewTitle" class="text-sm font-semibold text-gray-900 flex-1 truncate">文件预览</h3>
                <button id="closePreview" class="px-3 py-1 bg-gray-500 text-white rounded hover:bg-gray-600" onclick="closePreview()">关闭</button>
            </div>
            <div class="p-4">
                <div id="previewContent" class="flex justify-center"></div>
                <div id="shareText" class="mt-3 text-sm text-secondary break-words text-center"></div>
            </div>
        </div>
    </div>
    {{uploadSection}}
    <script>
        //主题初始化与切换
        var root = document.documentElement;
        var savedTheme = localStorage.getItem('webTheme');
        var prefersDark = window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)') : null;

        function applyTheme(mode) {
            root.setAttribute('data-theme', mode);
        }

        // Remove title attributes from an element and its descendants to prevent native tooltips
        function removeTitleAttributes(root) {
            if (!root) return;
            try {
                if (root.removeAttribute) root.removeAttribute('title');
            } catch (e) { }
            try {
                var nodes = root.querySelectorAll && root.querySelectorAll('[title]');
                if (nodes && nodes.length) {
                    for (var i = 0; i < nodes.length; i++) {
                        try { nodes[i].removeAttribute('title'); } catch (e) { }
                    }
                }
            } catch (e) { }
        }
        applyTheme(savedTheme ? savedTheme : (prefersDark && prefersDark.matches ? 'dark' : 'light'));
        if (prefersDark) {
            if (prefersDark.addEventListener) {
                prefersDark.addEventListener('change', function(e) {
                    if (!localStorage.getItem('webTheme')) applyTheme(e.matches ? 'dark' : 'light');
                });
            } else if (prefersDark.addListener) {
                prefersDark.addListener(function(e) {
                    if (!localStorage.getItem('webTheme')) applyTheme(e.matches ? 'dark' : 'light');
                });
            }
        }
        var themeToggle = document.getElementById('themeToggle');
        var themeToggleHeader = document.getElementById('themeToggleHeader');
        // detect touch-capable devices and disable hover preview on those
        var isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints && navigator.maxTouchPoints > 0);
        function handleThemeToggle() {
            var cur = root.getAttribute('data-theme');
            var next = cur === 'dark' ? 'light' : 'dark';
            applyTheme(next);
            localStorage.setItem('webTheme', next);
        }
        if (themeToggle) themeToggle.addEventListener('click', handleThemeToggle);
        if (themeToggleHeader) themeToggleHeader.addEventListener('click', handleThemeToggle);

        // Polyfill for Element.closest (not available in IE)
        if (typeof Element !== 'undefined' && !Element.prototype.closest) {
            Element.prototype.closest = function(selector) {
                var el = this;
                while (el && el.nodeType === 1) {
                    if (el.matches ? el.matches(selector) : (el.msMatchesSelector ? el.msMatchesSelector(selector) : false)) {
                        return el;
                    }
                    el = el.parentNode;
                }
                return null;
            };
        }

        // ===== 原有脚本保持 =====
        var previewFileNames = [];
        var currentPreviewIndex = -1;

        // ================= 悬停预览逻辑 =================
        var previewTimerId = null;
        var lastHoverCoords = null;
        var popover = document.getElementById('previewPopover');

        function startPreviewTimer(event, fileName, fileType) {
            if (isTouch) return; // disable hover preview on touch devices
            // 如果是目录等不需要预览的类型可直接返回（根据实际类型值调整判断）
            if (!fileName || /dir|folder|directory/i.test(fileType)) return;
            cancelPreviewTimer();
            lastHoverCoords = { x: event.pageX, y: event.pageY };
            previewTimerId = setTimeout(function() {
                openPreviewOrShare(fileName, lastHoverCoords, true);
            }, 600);
            //600ms 后触发
        }

        function startShareTimer(event, fileName) {
            if (isTouch) return; // disable hover share popover on touch devices
            cancelPreviewTimer();
            lastHoverCoords = { x: event.pageX, y: event.pageY };
            previewTimerId = setTimeout(function() {
                openPreviewOrShare(fileName, lastHoverCoords, true, 'share');
            }, 600);
            //600ms 后触发
        }

        function cancelPreviewTimer() {
            if (previewTimerId) {
                clearTimeout(previewTimerId);
                previewTimerId = null;
            }
        }

        function hidePreviewPopover() {
            popover.classList.add('hidden');
            popover.innerHTML = '';
        }

        function positionPopover(coords) {
            if (!coords) return;
            var offset = 14;
            var left = coords.x + offset;
            var top = coords.y + offset;
            var vw = window.innerWidth;
            var vh = window.innerHeight;
            var rect = popover.getBoundingClientRect();
            if (left + rect.width > vw - 20) left = vw - rect.width - 20;
            if (top + rect.height > vh - 20) top = vh - rect.height - 20;
            popover.style.left = left + 'px';
            popover.style.top = top + 'px';
        }

        function buildPreviewList() {
            var btns = document.querySelectorAll('#tableBody button[data-filename]');
            previewFileNames = [];
            for (var i = 0; i < btns.length; i++) {
                var name = btns[i].getAttribute('data-filename');
                if (name) previewFileNames.push(name);
            }
        }

        function updateNavButtons() {
            var prev = document.getElementById('prevBtn');
            var next = document.getElementById('nextBtn');
            prev.disabled = currentPreviewIndex <= 0;
            next.disabled = currentPreviewIndex >= previewFileNames.length - 1;
        }

        function openPreviewOrShare(fileName, coords, asPopover, type) {
            if (coords === undefined) coords = null;
            if (asPopover === undefined) asPopover = false;
            if (type === undefined) type = 'preview';
            if (asPopover) {
                popover.classList.remove('hidden');
                positionPopover(coords);
            }
            if (type === 'preview') {
                previewHandle(fileName, coords, asPopover);
                document.querySelector('#shareText').classList.add('hidden');
                document.querySelector('#prevBtn').classList.remove('hidden');
                document.querySelector('#nextBtn').classList.remove('hidden');
            } else {
                shareHandle(fileName, coords, asPopover);
                document.querySelector('#shareText').classList.remove('hidden');
                document.querySelector('#prevBtn').classList.add('hidden');
                document.querySelector('#nextBtn').classList.add('hidden');
            }
        }

        var imageExtensions = ['png', 'jpg', 'jpeg', 'gif', 'bmp', 'webp', 'svg'];
        var textExtensions = ['txt', 'md', 'html', 'js', 'css', 'json', 'log', 'xml', 'bat'];

        function arrayIncludes(arr, val) {
            return arr.indexOf(val) !== -1;
        }

        function previewHandle(fileName, coords, asPopover) {
            var fileExtension = fileName.split('.').pop().toLowerCase();
            if (asPopover) {
                popover.innerHTML = '<div class="text-secondary text-[11px]">加载中...</div>';
                if (arrayIncludes(imageExtensions, fileExtension)) {
                    var img = new Image();
                    img.onload = function() {
                        popover.innerHTML = '';
                        popover.appendChild(img);
                        positionPopover(coords);
                    };
                    img.onerror = function() {
                        popover.innerHTML = '<div class="text-red-500">图片加载失败</div>';
                    };
                    img.src = './' + fileName;
                    img.style.maxWidth = '260px';
                } else if (arrayIncludes(textExtensions, fileExtension)) {
                    if (typeof fetch === 'function') {
                        fetch('./' + fileName)
                            .then(function(r) { return r.text(); })
                            .then(function(text) {
                                var pre = document.createElement('pre');
                                if (text.length > 800) text = text.slice(0, 800) + '\n...';
                                pre.textContent = text;
                                popover.innerHTML = '';
                                popover.appendChild(pre);
                                positionPopover(coords);
                            })
                            .catch(function() {
                                popover.innerHTML = '<div class="text-red-500">预览失败</div>';
                            });
                    } else {
                        popover.innerHTML = '<div class="text-secondary">不支持预览</div>';
                    }
                } else {
                    popover.innerHTML = '<div class="text-secondary">不支持预览</div>';
                }
                return; // 不走模态框逻辑
            }
            // ================= 原模态框逻辑（点击） =================
            buildPreviewList();
            currentPreviewIndex = previewFileNames.indexOf(fileName);
            var modal = document.getElementById('previewModal');
            var titleEl = document.getElementById('previewTitle');
            var contentEl = document.getElementById('previewContent');
            titleEl.textContent = fileName;
            contentEl.innerHTML = '';
            var el;
            if (arrayIncludes(imageExtensions, fileExtension)) {
                el = document.createElement('img');
                el.src = './' + fileName;
                el.classList.add('max-w-full');
                el.classList.add('h-auto');
                contentEl.appendChild(el);
                modal.classList.remove('hidden');
                modal.style.display = 'flex';
            } else if (arrayIncludes(textExtensions, fileExtension)) {
                if (typeof fetch === 'function') {
                    fetch('./' + fileName)
                        .then(function(r) { return r.text(); })
                        .then(function(text) {
                            el = document.createElement('pre');
                            el.textContent = text;
                            el.classList.add('whitespace-pre-wrap');
                            el.classList.add('p-3');
                            el.classList.add('rounded');
                            el.classList.add('max-h-[60vh]');
                            el.classList.add('overflow-auto');
                            el.classList.add('text-xs');
                            el.style.background = 'var(--panel-border)';
                            contentEl.appendChild(el);
                            modal.classList.remove('hidden');
                            modal.style.display = 'flex';
                        })
                        .catch(function() {
                            el = document.createElement('p');
                            el.textContent = '预览失败。';
                            el.classList.add('text-red-500');
                            contentEl.appendChild(el);
                            modal.classList.remove('hidden');
                            modal.style.display = 'flex';
                        });
                } else {
                    el = document.createElement('p');
                    el.textContent = '不支持预览此文件类型。';
                    el.classList.add('text-secondary');
                    contentEl.appendChild(el);
                    modal.classList.remove('hidden');
                    modal.style.display = 'flex';
                }
            } else {
                el = document.createElement('p');
                el.textContent = '不支持预览此文件类型。';
                el.classList.add('text-secondary');
                contentEl.appendChild(el);
                modal.classList.remove('hidden');
                modal.style.display = 'flex';
            }
            updateNavButtons();
        }

        function shareHandle(fileName, coords, asPopover) {
            var shareUrl = location.href + fileName;
            try {
                // prefer URL constructor to correctly resolve relative filenames and avoid double-encoding issues
                shareUrl = new URL(fileName, location.href).href;
            } catch (e) {
                // fallback to simple concatenation
                shareUrl = location.href + fileName;
            }
            if (asPopover) {
                // render a small popover QR that doesn't affect layout
                popover.innerHTML = '';
                var popSize = Math.min(160, Math.floor(window.innerWidth * 0.35));
                try {
                    new QRCode(popover, { text: shareUrl, width: popSize, height: popSize });
                } catch (e) {
                    // fallback for older qrcode lib signature
                    new QRCode(popover, shareUrl);
                }
                // 设置悬停提示为未转义的可读 URL（仅用于显示），但保持 QR 内容使用编码后的 shareUrl
                try {
                    var parsedPopover = null;
                    try { parsedPopover = new URL(shareUrl, location.href); } catch (e) { parsedPopover = null; }
                    var displayPopover = shareUrl;
                    if (parsedPopover) {
                        try {
                            var decodedPathPopover = decodeURIComponent(parsedPopover.pathname);
                            displayPopover = parsedPopover.protocol + '//' + parsedPopover.host + decodedPathPopover + parsedPopover.search + parsedPopover.hash;
                        } catch (e) {
                            try { displayPopover = parsedPopover.protocol + '//' + parsedPopover.host + decodeURI(parsedPopover.pathname) + parsedPopover.search + parsedPopover.hash; } catch (e2) { displayPopover = parsedPopover.href; }
                        }
                    }
                    popover.title = displayPopover;
                    popover.setAttribute('aria-label', displayPopover);
                } catch (e) { /* ignore */ }
                var raf = window.requestAnimationFrame || window.msRequestAnimationFrame || function(cb) { setTimeout(cb, 16); };
                raf(function() {
                    positionPopover(coords);
                });
                return;
            }

            var modal = document.getElementById('previewModal');
            var titleEl = document.getElementById('previewTitle');
            var contentEl = document.getElementById('previewContent');
            var shareTextEl = document.getElementById('shareText');
            titleEl.textContent = fileName;
            contentEl.innerHTML = '';
            // 使用 innerHTML 以便不对分享链接进行转义，按照需要在服务器端保证内容安全
            // 使用安全的 DOM 操作来插入分享链接：创建一个 `a` 元素并设置 `textContent`，
            // 避免使用 `innerHTML` 导致的 XSS 风险，同时保持可点击并显示原始明文。
            shareTextEl.innerHTML = '';
            try {
                var link = document.createElement('a');
                // 解析 URL 以便仅解码 pathname 部分（将 %20 转为空格），同时保持 href 使用编码形式
                var parsedShare = null;
                try {
                    parsedShare = new URL(shareUrl, location.href);
                } catch (e) {
                    parsedShare = null;
                }
                if (parsedShare && (parsedShare.protocol === 'http:' || parsedShare.protocol === 'https:')) {
                    link.href = parsedShare.href;
                    link.target = '_blank';
                    link.rel = 'noopener noreferrer';
                    // 仅对 pathname 使用 decodeURIComponent，以显示可读的文件名/路径
                    var decodedPath;
                    try {
                        decodedPath = decodeURIComponent(parsedShare.pathname);
                    } catch (e) {
                        try { decodedPath = decodeURI(parsedShare.pathname); } catch (e2) { decodedPath = parsedShare.pathname; }
                    }
                    var display = parsedShare.protocol + '//' + parsedShare.host + decodedPath + parsedShare.search + parsedShare.hash;
                    link.textContent = display;
                } else {
                    // 非 HTTP(S) 或解析失败：安全回退，仅显示解码后的原始字符串（不可点击）
                    var decoded;
                    try { decoded = decodeURIComponent(shareUrl); } catch (e) { try { decoded = decodeURI(shareUrl); } catch (e2) { decoded = shareUrl; } }
                    link.textContent = decoded;
                    link.removeAttribute('href');
                    link.style.cursor = 'default';
                }
                shareTextEl.appendChild(link);
            } catch (e) {
                shareTextEl.textContent = shareUrl;
            }
            // render QR responsively so it fits on narrow screens
            var maxModalWidth = Math.floor(window.innerWidth * 0.8);
            var qrSize = Math.min(360, Math.max(120, maxModalWidth));
            try {
                new QRCode(contentEl, { text: shareUrl, width: qrSize, height: qrSize });
            } catch (e) {
                new QRCode(contentEl, shareUrl);
            }
            // Remove title attributes to avoid native tooltip showing on hover over modal content
            removeTitleAttributes(modal);
            modal.classList.remove('hidden');
            modal.style.display = 'flex';
        }

        function shareFile(e) {
            var fileName = e.currentTarget.getAttribute('data-filename');
            // ensure any hover popover is cancelled/hidden before opening modal
            cancelPreviewTimer();
            hidePreviewPopover();
            openPreviewOrShare(fileName, null, false, 'share');
        }

        function previewFile(e) {
            var fileName = e.currentTarget.getAttribute('data-filename');
            // ensure any hover popover is cancelled/hidden before opening modal
            cancelPreviewTimer();
            hidePreviewPopover();
            openPreviewOrShare(fileName);
        }

        function closePreview() {
            var modal = document.getElementById('previewModal');
            modal.classList.add('hidden');
            modal.style.display = 'none';
            currentPreviewIndex = -1;
        }

        function previewPrev() {
            if (currentPreviewIndex > 0) {
                openPreviewOrShare(previewFileNames[currentPreviewIndex - 1]);
            }
        }

        function previewNext() {
            if (currentPreviewIndex < previewFileNames.length - 1) {
                openPreviewOrShare(previewFileNames[currentPreviewIndex + 1]);
            }
        }

        // 点击遮罩空白关闭
        document.getElementById('previewModal').addEventListener('click', function (e) {
            if (e.target.id === 'previewModal') {
                closePreview();
            }
        });

        // 键盘导航
        document.addEventListener('keydown', function (e) {
            var visible = !document.getElementById('previewModal').classList.contains('hidden');
            if (!visible) return;
            var key = e.key || '';
            var keyCode = e.keyCode || e.which || 0;
            if (key === 'ArrowLeft' || keyCode === 37) {
                previewPrev();
            } else if (key === 'ArrowRight' || keyCode === 39) {
                previewNext();
            } else if (key === 'Escape' || keyCode === 27) {
                closePreview();
            }
        });

        // 仅文件名链接悬停触发
        var tableBody = document.getElementById('tableBody');
        tableBody.addEventListener('mouseover', function(e) {
            var link = e.target.closest('a[data-hover-preview]');
            if (link) {
                startPreviewTimer(e, link.getAttribute('data-filename'), link.getAttribute('data-filetype'));
                return;
            }
            link = e.target.closest('button[data-hover-share]');
            if (link) {
                startShareTimer(e, link.getAttribute('data-filename'));
            }
        });
        tableBody.addEventListener('mouseout', function(e) {
            var link = e.target.closest('a[data-hover-preview]') || e.target.closest('button[data-hover-share]');
            if (link) {
                cancelPreviewTimer();
                hidePreviewPopover();
            }
        });
        tableBody.addEventListener('mousemove', function(e) {
            if (!popover.classList.contains('hidden')) {
                lastHoverCoords = { x: e.pageX, y: e.pageY };
                positionPopover(lastHoverCoords);
            }
        });
    </script>
</body>
</html>
