 <strong>很抱歉，如果没有启用JavaScript，web将无法正常工作。请启用后继续。</strong>

<!-- 拖拽上传模态框 -->
<div id="uploadModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
 <div class="theme-panel rounded-xl shadow-2xl w-full max-w-[70%] max-h-[80vh] mx-4 flex flex-col">
 <div class="px-6 py-3 border-b panel-border flex items-center justify-between">
 <h3 class="text-sm font-semibold text-primary">上传文件</h3>
 <button class="text-xs text-secondary hover:text-primary" onclick="cancel()">关闭</button>
 </div>
 <div class="flex-1 overflow-hidden flex flex-col">
 <div class="flex-1 overflow-auto">
 <table class="w-full divide-y text-xs" style="border-color: var(--panel-border)">
 <thead class="sticky top-0" style="background: var(--panel-bg)">
 <tr>
 <th class="px-3 py-2 text-left font-medium text-secondary">名称</th>
 <th class="px-3 py-2 text-left font-medium text-secondary">大小</th>
 <th class="px-3 py-2 text-left font-medium text-secondary">修改日期</th>
 <th class="px-3 py-2 text-left font-medium text-secondary">状态</th>
 </tr>
 </thead>
 <tbody id="fileInfo" class="divide-y" style="border-color: var(--panel-border)"></tbody>
 </table>
 </div>
 <div class="mt-2 p-2 text-center text-[11px]" style="background: var(--panel-border); color: var(--text)" id="overview"></div>
 </div>
 <div class="px-4 py-3 border-t panel-border flex justify-end space-x-2">
 <button id="confirm" class="hidden px-3 py-1 btn-accent rounded text-xs" onclick="confirmAndReload()">确定</button>
 <button id="cancel" class="hidden px-3 py-1 rounded text-xs" style="background: transparent; color: var(--text); border:1px solid var(--panel-border)" onclick="cancel()">取消</button>
 <button id="uploader" class="hidden px-3 py-1 btn-accent rounded text-xs" onclick="sendFiles()">开始上传</button>
 </div>
 </div>
</div>
<script>
 function ConcurrentUploadQueue(maxConcurrent) {
  this.maxConcurrent = (maxConcurrent !== undefined) ? maxConcurrent : 3;
  this.running = 0;
  this.queue = [];
  this.completed = 0;
  this.total = 0;
  this.results = [];
  this.errors = [];
  this.onProgress = null;
  this.onComplete = null;
  this.onError = null;
 }
 ConcurrentUploadQueue.prototype.addTask = function(uploadFunction, file, options) {
  if (options === undefined) options = {};
  var self = this;
  return new Promise(function(resolve, reject) {
   self.queue.push({ uploadFunction: uploadFunction, file: file, options: options, resolve: resolve, reject: reject });
   self.total++;
  });
 };
 ConcurrentUploadQueue.prototype.startTask = function() { this._next(); };
 ConcurrentUploadQueue.prototype._next = function() {
  if (this.running >= this.maxConcurrent || this.queue.length === 0) return;
  var task = this.queue.shift();
  this.running++;
  var self = this;
  this._updateProgress();
  task.uploadFunction(task.file, task.options).then(function(result) {
   self.results.push({ file: task.file, result: result, timestamp: new Date() });
   task.resolve(result);
   self.running--;
   self.completed++;
   self._updateProgress();
   if (self.completed === self.total && self.running === 0) self._onComplete();
   self._next();
  }, function(error) {
   self.errors.push({ file: task.file, error: error, timestamp: new Date() });
   task.reject(error);
   if (self.onError) self.onError(error, task.file);
   self.running--;
   self.completed++;
   self._updateProgress();
   if (self.completed === self.total && self.running === 0) self._onComplete();
   self._next();
  });
  if (this.running < this.maxConcurrent && this.queue.length > 0) this._next();
 };
 ConcurrentUploadQueue.prototype._updateProgress = function() {
  if (!this.onProgress) return;
  this.onProgress({ completed: this.completed, total: this.total, running: this.running, queued: this.queue.length, progress: this.total > 0 ? (this.completed / this.total) * 100 : 0 });
 };
 ConcurrentUploadQueue.prototype._onComplete = function() {
  if (this.onComplete) this.onComplete({ results: this.results, errors: this.errors, total: this.total, completed: this.completed });
 };
 ConcurrentUploadQueue.prototype.setConcurrency = function(v) {
  this.maxConcurrent = v;
  while (this.running < this.maxConcurrent && this.queue.length > 0) this._next();
 };
 ConcurrentUploadQueue.prototype.getStatus = function() {
  return { running: this.running, queued: this.queue.length, completed: this.completed, total: this.total, progress: this.total > 0 ? (this.completed / this.total) * 100 : 0, results: this.results, errors: this.errors };
 };
 ConcurrentUploadQueue.prototype.clear = function() {
  this.running = 0; this.queue = []; this.completed = 0; this.total = 0; this.results = []; this.errors = [];
 };

 function UploadManager() {
  var pathname = window.location.pathname;
  this.uploadServer = pathname.charAt(pathname.length - 1) === '/' ? pathname : pathname + '/';
  this.queue = new ConcurrentUploadQueue(3);
  this.setupEventListeners();
  this.onComplete = null;
 }
 // 每次只上传一个文件，将文件目标路径拼接到 POST URL 中；进度用 xhr.upload.onprogress
 UploadManager.prototype.simulateUpload = function(file, progressEle) {
  var uploadServer = this.uploadServer;
  return new Promise(function(resolve, reject) {
   var rawPath = file.fullPath || file.webkitRelativePath || file.name;
   var relPath = rawPath.replace(/^\\/, '').replace(/^\//, '');
   // 对路径各段单独编码后拼接到上传地址，使 POST URL 即为目标文件路径
   var encodedPath = relPath.split('/').map(function(s) { return encodeURIComponent(s); }).join('/');
   var targetUrl = uploadServer + encodedPath;
   var xhr = new XMLHttpRequest();
   xhr.open('POST', targetUrl, true);
   // 直接发送文件二进制流，不使用 multipart，无文件大小限制
   xhr.setRequestHeader('Content-Type', file.type || 'application/octet-stream');
   xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
     if (xhr.status === 200) {
      if (progressEle) progressEle.innerText = '上传完毕';
      try { resolve(JSON.parse(xhr.responseText)); } catch(e) { resolve(xhr.responseText); }
     } else {
      if (progressEle) progressEle.innerText = '上传失败';
      reject(new Error('HTTP ' + xhr.status));
     }
    }
   };
   if (xhr.upload) {
    xhr.upload.onprogress = function(e) {
     if (e.lengthComputable) {
      var p = ((e.loaded / e.total) * 100).toFixed(2);
      if (progressEle) progressEle.innerText = '上传中：' + p + '%';
     }
    };
   }
   xhr.onerror = function() {
    if (progressEle) progressEle.innerText = '上传错误';
    reject(new Error('Network error'));
   };
   xhr.send(file);
  });
 };
 UploadManager.prototype.addFiles = function(files) {
  var self = this;
  return new Promise(function(resolve) {
   for (var i = 0; i < files.length; i++) {
    self.queue.addTask(self.simulateUpload.bind(self), files[i].file, files[i].progressEle).then(function() {}).catch(function() {});
   }
   resolve();
  });
 };
 UploadManager.prototype.setupEventListeners = function() {
  var self = this;
  this.queue.onProgress = function(p) {
   var overview = document.getElementById('overview');
   if (overview) overview.innerText = '进度: ' + p.completed + '/' + p.total + ' |运行中: ' + p.running + ' | 等待中: ' + p.queued;
  };
  this.queue.onComplete = function(s) {
   if (self.onComplete) self.onComplete(s);
  };
  this.queue.onError = function(err, file) {
   console.error('上传错误:', file && file.name, err);
  };
 };
 UploadManager.prototype.clear = function() {
  this.queue.clear();
  var overview = document.getElementById('overview');
  if (overview) overview.innerText = '';
 };
 // 刷新确认：上传完成后点击"确定"刷新当前页面
 function confirmAndReload() {
  try { document.querySelector('#uploadModal').classList.add('hidden'); } catch(e) {}
  try { if (uploadManager && uploadManager.clear) uploadManager.clear(); } catch(e) {}
  window.location.reload();
 }
// ===== Upload UI logic (moved here so it's only present when uploads enabled) =====
var files = [];
var mainBody = document.querySelector('body');
var uploadManager = new UploadManager();

mainBody.addEventListener('dragover', function(e) { e.preventDefault(); });
mainBody.addEventListener('dragleave', function(e) { e.preventDefault(); });
mainBody.addEventListener('drop', dropHandle);

function dropHandle(event) {
    event.preventDefault();
    if (!event.dataTransfer || !event.dataTransfer.items) return;
    var items = event.dataTransfer.items;
    var promises = [];
    for (var i = 0; i < items.length; i++) {
        var entry = items[i].webkitGetAsEntry && items[i].webkitGetAsEntry();
        if (entry) promises.push(readFiles(entry));
    }
    Promise.all(promises).then(function(resultFilesArrays) {
        var flat = [];
        for (var i = 0; i < resultFilesArrays.length; i++) {
            flat = flat.concat(resultFilesArrays[i]);
        }
        files = flat.reverse();

        var dataStr = '';
        for (var i = 0; i < files.length; i++) {
            var file = files[i];
            dataStr += "<tr class='row-hover transition-colors'>" +
                       "<td class='px-6 py-4 whitespace-nowrap text-sm text-secondary'>" + file.fullPath + "</td>" +
                       "<td class='px-6 py-4 whitespace-nowrap text-sm text-secondary'>" + getFileSize(file.size) + "</td>" +
                       "<td class='px-6 py-4 whitespace-nowrap text-sm text-secondary'>" + formatDate(file.lastModifiedDate) + "</td>" +
                       "<td class='px-6 py-4 whitespace-nowrap text-sm text-secondary uploadStatus'>待上传</td>" +
                       "</tr>";
        }

        document.querySelector('#fileInfo').innerHTML = dataStr;
        var overview = document.getElementById('overview');
        overview.innerText = '文件总数：' + files.length;

        document.querySelector('#confirm').classList.add('hidden');
        document.querySelector('#cancel').classList.remove('hidden');
        document.querySelector('#uploader').classList.remove('hidden');
        document.querySelector('#uploadModal').classList.remove('hidden');
    });
}
//读取文件/文件夹
function readFiles(item) {
    if (item.isDirectory) {
        // 是一个文件夹
        var directoryReader = item.createReader();
        // readEntries是一个异步方法
        return new Promise(function(resolve, reject) {
            directoryReader.readEntries(resolve, reject);
        }).then(function(entries) {
            var promises = [];
            for (var i = 0; i < entries.length; i++) {
                promises.push(readFiles(entries[i]));
            }
            return Promise.all(promises).then(function(arrays) {
                var result = [];
                for (var i = 0; i < arrays.length; i++) {
                    result = result.concat(arrays[i]);
                }
                return result;
            });
        });
    } else {
        // 是一个文件
        return new Promise(function(resolve, reject) {
            item.file(resolve, reject);
        }).then(function(file) {
            file.fullPath = item.fullPath;
            return [file];
        });
    }
}

function sendFiles() {
    if (!files.length) return;
    document.querySelector('#confirm').classList.add('hidden');
    document.querySelector('#cancel').classList.remove('hidden');
    document.querySelector('#uploader').classList.add('hidden');
    var statusBoxs = Array.prototype.slice.call(document.querySelectorAll('.uploadStatus'));
    var fileItems = statusBoxs.map(function(e, i) {
        return {
            file: files[i],
            progressEle: e,
        };
    });

    uploadManager.addFiles(fileItems).then(function() {
        uploadManager.queue.getStatus();
        uploadManager.queue.startTask();
        uploadManager.onComplete = function(summary) {
            files = [];
            document.querySelector('#confirm').classList.remove('hidden');
            document.querySelector('#cancel').classList.add('hidden');
            document.querySelector('#uploader').classList.add('hidden');
        };
    });
}

function cancel() {
    files = [];
    document.querySelector('#uploadModal').classList.add('hidden');
    uploadManager.clear();
}

function getFileSize(srcLength) {
    var units = ['B', 'KB', 'MB', 'GB'];
    var v = srcLength;
    var uIndex = 0;
    while (v > 1024 && uIndex < 3) {
        uIndex++;
        v /= 1024;
    }
    return (Math.round(v * 100) / 100) + ' ' + units[uIndex];
}

function formatDate(v) {
    var dt = new Date();
    if (v instanceof Date) dt = v;
    else if (typeof v === 'number') {
        dt = new Date(v);
    }
    var num_year = dt.getFullYear();
    var num_month = dt.getMonth() + 1;
    var num_date = dt.getDate();
    var num_hour = dt.getHours();
    var num_min = dt.getMinutes();
    var num_sec = dt.getSeconds();

    return num_year + '-' + (num_month < 10 ? '0' + num_month : num_month) + '-' + (num_date < 10 ? '0' + num_date : num_date) +
        ' ' + (num_hour < 10 ? '0' + num_hour : num_hour) + ':' + (num_min < 10 ? '0' + num_min : num_min) +
        ':' + (num_sec < 10 ? '0' + num_sec : num_sec);
}
</script>
